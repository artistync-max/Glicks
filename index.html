<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glicks - Premium Media Downloader</title>
    <!-- Stable Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel to compile JSX in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0B0F19; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const Sparkles = () => <span style={{color: '#60A5FA'}}>✨</span>;
        const Download = () => <span>📥</span>;
        const LinkIcon = () => <span>🔗</span>;
        const RefreshCw = ({className}) => <span className={className}>🔄</span>;

        const SAMPLE_LINKS = [
          { label: "YouTube Video", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
          { label: "Instagram Reel", url: "https://www.instagram.com/p/CgX942kJXy3/" },
          { label: "Spotify Track", url: "https://open.spotify.com/track/4PTG3Z6ehGkBF36qJkua6C" }
        ];

        function App() {
          const [activePage, setActivePage] = React.useState('home');
          const [urlInput, setUrlInput] = React.useState('');
          const [isProcessing, setIsProcessing] = React.useState(false);
          const [processStep, setProcessStep] = React.useState('');
          const [mediaDetails, setMediaDetails] = React.useState(null);
          const [selectedFormat, setSelectedFormat] = React.useState('mp4-1080p');
          const [isDownloading, setIsDownloading] = React.useState(false);
          const [downloadProgress, setDownloadProgress] = React.useState(0);
          const [isCompleted, setIsCompleted] = React.useState(false);
          const [toasts, setToasts] = React.useState([]);

          const showToast = (message) => {
            const id = Date.now();
            setToasts((prev) => [...prev, { id, message }]);
            setTimeout(() => {
              setToasts((prev) => prev.filter((t) => t.id !== id));
            }, 3000);
          };

          const handleAnalyze = (e) => {
            if (e) e.preventDefault();
            if (!urlInput.trim()) {
              showToast("Please enter a valid link.");
              return;
            }
            setIsProcessing(true);
            setMediaDetails(null);
            setIsCompleted(false);

            const steps = [
              "Connecting to stream servers...",
              "Bypassing geo-blocks...",
              "Extracting media file format..."
            ];

            let step = 0;
            const interval = setInterval(() => {
              if (step < steps.length) {
                setProcessStep(steps[step]);
                step++;
              } else {
                clearInterval(interval);
                setMediaDetails({
                  title: "Extracted Premium Media File",
                  formats: [
                    { id: 'mp4-1080p', label: 'MP4 Video (1080p Full HD)', size: '45.2 MB' },
                    { id: 'mp3-320', label: 'MP3 Audio (320kbps High)', size: '8.4 MB' }
                  ]
                });
                setIsProcessing(false);
                showToast("Success! Formats loaded.");
              }
            }, 800);
          };

          const startDownload = () => {
            setIsDownloading(true);
            setDownloadProgress(0);

            const interval = setInterval(() => {
              setDownloadProgress(prev => {
                if (prev >= 100) {
                  clearInterval(interval);
                  setIsDownloading(false);
                  setIsCompleted(true);
                  showToast("Download Completed!");
                  return 100;
                }
                return prev + 20;
              });
            }, 400);
          };

          return (
            <div className="min-h-screen bg-[#0B0F19] text-white flex flex-col justify-between font-sans">
              {/* Toast */}
              <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full px-4">
                {toasts.map(t => (
                  <div key={t.id} className="p-4 rounded-xl bg-gray-900 border border-blue-500/30 text-white flex gap-2 items-center shadow-lg">
                    <span>✓ {t.message}</span>
                  </div>
                ))}
              </div>

              {/* Header */}
              <header className="border-b border-white/5 bg-[#0B0F19]/80 backdrop-blur-md sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                  <div onClick={() => setActivePage('home')} className="flex items-center gap-2 cursor-pointer">
                    <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center"><Sparkles /></div>
                    <span className="text-xl font-bold tracking-tight">Glicks</span>
                  </div>
                  <nav className="flex gap-6 text-sm">
                    <button onClick={() => setActivePage('home')} className="hover:text-blue-400">Home</button>
                    <button onClick={() => setActivePage('features')} className="hover:text-blue-400">Features</button>
                  </nav>
                </div>
              </header>

              {/* Content */}
              <main className="max-w-7xl mx-auto px-4 py-12 flex-1 w-full flex flex-col justify-center">
                {activePage === 'home' && (
                  <div className="space-y-12">
                    <div className="text-center space-y-4 max-w-2xl mx-auto">
                      <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight">
                        Download <span className="text-blue-400">Videos & Music</span>
                      </h1>
                      <p className="text-gray-400 text-sm md:text-base">
                        Paste links from YouTube, Instagram, or Spotify below.
                      </p>
                    </div>

                    <div className="max-w-xl mx-auto w-full px-2">
                      <form onSubmit={handleAnalyze} className="p-2 bg-[#111827] border border-white/10 rounded-2xl flex flex-col gap-2 shadow-xl">
                        <div className="flex items-center gap-2 px-3 py-2 flex-1">
                          <LinkIcon />
                          <input 
                            type="url" 
                            value={urlInput}
                            onChange={(e) => setUrlInput(e.target.value)}
                            placeholder="Paste link here..." 
                            className="bg-transparent border-0 text-white w-full focus:outline-none text-sm md:text-base"
                          />
                        </div>
                        <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 w-full">
                          <Download /> Analyse Link
                        </button>
                      </form>
                      
                      <div className="flex flex-wrap gap-2 justify-center mt-4">
                        {SAMPLE_LINKS.map((s, i) => (
                          <button 
                            key={i} 
                            type="button" 
                            onClick={() => setUrlInput(s.url)} 
                            className="text-gray-400 hover:text-white text-xs px-3 py-1.5 bg-white/5 rounded-lg border border-white/5 transition-all"
                          >
                            {s.label}
                          </button>
                        ))}
                      </div>
                    </div>

                    {isProcessing && (
                      <div className="max-w-md mx-auto p-6 bg-[#111827] rounded-2xl border border-blue-500/20 text-center space-y-4 shadow-lg animate-pulse">
                        <RefreshCw className="inline-block text-xl text-blue-400" />
                        <p className="text-sm text-blue-400 font-medium">{processStep}</p>
                      </div>
                    )}

                    {mediaDetails && !isProcessing && (
                      <div className="max-w-xl mx-auto p-6 bg-[#111827] rounded-2xl border border-white/10 space-y-4 shadow-2xl">
                        <h3 className="font-bold text-lg text-white border-b border-white/5 pb-2">{mediaDetails.title}</h3>
                        <div className="space-y-2">
                          {mediaDetails.formats.map(f => (
                            <button 
                              key={f.id} 
                              type="button"
                              onClick={() => setSelectedFormat(f.id)}
                              className={`w-full p-4 rounded-xl border text-left flex justify-between items-center transition-all ${selectedFormat === f.id ? 'border-blue-500 bg-blue-500/10 text-blue-400' : 'border-white/5 bg-gray-900 hover:bg-gray-800 text-gray-300'}`}
                            >
                              <span className="font-medium text-sm">{f.label}</span>
                              <span className="font-bold text-xs bg-white/5 px-2 py-1 rounded">{f.size}</span>
                            </button>
                          ))}
                        </div>
                        {!isDownloading && !isCompleted && (
                          <button onClick={startDownload} type="button" className="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-sm transition-all shadow-lg">
                            Get Download Link
                          </button>
                        )}
                        {isDownloading && (
                          <div className="space-y-2 pt-2">
                            <div className="h-2 w-full bg-gray-800 rounded-full overflow-hidden">
                              <div className="h-full bg-blue-500 transition-all duration-300" style={{ width: `${downloadProgress}%` }}></div>
                            </div>
                            <p className="text-center text-xs text-gray-400 font-medium">Downloading... {downloadProgress}%</p>
                          </div>
                        )}
                        {isCompleted && (
                          <div className="text-center text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-xl font-bold text-sm py-3 animate-bounce">
                            ✓ File Downloaded Successfully!
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {activePage === 'features' && (
                  <div className="max-w-4xl mx-auto space-y-8 text-center py-20">
                    <h2 className="text-3xl font-extrabold tracking-tight">Premium Features</h2>
                    <p className="text-gray-400 max-w-md mx-auto text-sm leading-relaxed">
                      High speed multi-threaded extraction, zero pop-up ads, and completely clean interfaces for unlimited media conversion.
                    </p>
                  </div>
                )}
              </main>

              {/* Footer */}
              <footer className="border-t border-white/5 py-6 bg-gray-900/20 text-center text-xs text-gray-500">
                <span>© 2026 Glicks. Free Branded Extractor Tools.</span>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
