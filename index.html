<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glicks - Premium Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist Sans', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #060814; color: #F3F4F6; }
    </style>
</head>
<body class="font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const SparklesIcon = () => (
            <svg className="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        );

        const DownloadIcon = () => (
            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        const LinkIcon = () => (
            <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
            </svg>
        );

        const SAMPLE_LINKS = [
          { label: "YouTube Video", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" },
          { label: "Instagram Reel", url: "https://www.instagram.com/p/CgX942kJXy3/" },
          { label: "Spotify Track", url: "https://open.spotify.com/track/4PTG3Z6ehGkBF36qJkua6C" }
        ];

        function App() {
          const [activePage, setActivePage] = React.useState('home');
          const [urlInput, setUrlInput] = React.useState('');
          const [isProcessing, setIsProcessing] = React.useState(false);
          const [processStep, setProcessStep] = React.useState('');
          const [mediaDetails, setMediaDetails] = React.useState(null);
          const [isDownloading, setIsDownloading] = React.useState(false);
          const [isCompleted, setIsCompleted] = React.useState(false);
          const [realDownloadUrl, setRealDownloadUrl] = React.useState('');
          const [toasts, setToasts] = React.useState([]);
          const [openFaq, setOpenFaq] = React.useState(null);

          const showToast = (message) => {
            const id = Date.now();
            setToasts((prev) => [...prev, { id, message }]);
            setTimeout(() => {
              setToasts((prev) => prev.filter((t) => t.id !== id));
            }, 3000);
          };

          // API Call to convert/parse Instagram/YouTube links
          const handleAnalyze = async (e) => {
            if (e) e.preventDefault();
            if (!urlInput.trim()) {
              showToast("Please enter a valid link.");
              return;
            }
            setIsProcessing(true);
            setMediaDetails(null);
            setIsCompleted(false);
            setProcessStep("Connecting to API extraction servers...");

            try {
              // Using a public free media proxy endpoint (Cobalt-like instance API)
              const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Accept": "application/json"
                },
                body: JSON.stringify({
                  url: urlInput,
                  videoQuality: "720",
                  audioFormat: "mp3"
                })
              });

              const data = await response.json();

              if (data.status === "stream" || data.status === "redirect" || data.url) {
                setRealDownloadUrl(data.url);
                setMediaDetails({
                  title: "Extracted Media Stream Ready",
                  formats: [{ id: 'direct', label: 'Playable HD Media file', size: 'Auto' }]
                });
                showToast("Success! Direct download link ready.");
              } else {
                throw new Error("Unable to parse link.");
              }
            } catch (err) {
              console.error(err);
              // Fallback logic in case public API is busy
              showToast("API server busy. Generating fallback tunnel link...");
              setRealDownloadUrl(`https://loader.to/api/button/?url=${encodeURIComponent(urlInput)}&f=mp4`);
              setMediaDetails({
                title: "Fallback Download Tunnel Ready",
                formats: [{ id: 'fallback', label: 'Download via External Tunnel (MP4)', size: 'Dynamic' }]
              });
            } finally {
              setIsProcessing(false);
            }
          };

          const startDownload = () => {
            setIsDownloading(true);
            
            // Open the extracted high-speed video url in new tab or trigger browser download
            if (realDownloadUrl) {
              window.open(realDownloadUrl, '_blank');
              setIsDownloading(false);
              setIsCompleted(true);
              showToast("Download started successfully!");
            } else {
              showToast("Error starting download.");
              setIsDownloading(false);
            }
          };

          const toggleFaq = (index) => {
            setOpenFaq(openFaq === index ? null : index);
          };

          return (
            <div className="min-h-screen bg-[#060814] text-gray-100 flex flex-col justify-between selection:bg-blue-500/30">
              {/* Toast */}
              <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 max-w-sm w-full px-4">
                {toasts.map(t => (
                  <div key={t.id} className="p-4 rounded-2xl bg-gray-950 border border-blue-500/20 text-white flex gap-2 items-center shadow-xl backdrop-blur-md">
                    <span className="text-blue-400">✓</span>
                    <span className="text-sm font-medium">{t.message}</span>
                  </div>
                ))}
              </div>

              {/* Header */}
              <header className="border-b border-white/[0.04] bg-[#060814]/80 backdrop-blur-md sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                  <div onClick={() => setActivePage('home')} className="flex items-center gap-2.5 cursor-pointer">
                    <div className="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                      <SparklesIcon />
                    </div>
                    <span className="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">Glicks</span>
                  </div>
                  <nav className="flex gap-6 text-sm font-medium">
                    <button onClick={() => setActivePage('home')} className={`transition-colors ${activePage === 'home' ? 'text-blue-400' : 'text-gray-400 hover:text-white'}`}>Home</button>
                    <button onClick={() => setActivePage('features')} className={`transition-colors ${activePage === 'features' ? 'text-blue-400' : 'text-gray-400 hover:text-white'}`}>Features</button>
                  </nav>
                </div>
              </header>

              {/* Content */}
              <main className="max-w-7xl mx-auto px-4 py-12 flex-1 w-full flex flex-col justify-center">
                {activePage === 'home' && (
                  <div className="space-y-16">
                    <div className="space-y-12">
                      <div className="text-center space-y-4 max-w-2xl mx-auto">
                        <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight leading-none text-white">
                          Premium <span className="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Media Extractor</span>
                        </h1>
                        <p className="text-gray-400 text-sm md:text-base max-w-md mx-auto font-medium">
                          Paste links from YouTube, Instagram, or Spotify below.
                        </p>
                      </div>

                      <div className="max-w-2xl mx-auto w-full px-2">
                        <form onSubmit={handleAnalyze} className="p-2 bg-[#0F1224]/80 border border-white/[0.06] rounded-2xl flex flex-col sm:flex-row gap-2 shadow-2xl backdrop-blur-sm">
                          <div className="flex items-center gap-3 px-3 py-2 flex-1">
                            <LinkIcon />
                            <input 
                              type="url" 
                              value={urlInput}
                              onChange={(e) => setUrlInput(e.target.value)}
                              placeholder="Paste link here..." 
                              className="bg-transparent border-0 text-white w-full focus:outline-none text-sm md:text-base placeholder-gray-500 font-medium"
                            />
                          </div>
                          <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-xl font-semibold text-sm transition-all flex items-center justify-center shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                            <DownloadIcon /> Analyse Link
                          </button>
                        </form>
                        
                        <div className="flex flex-wrap gap-2 justify-center mt-5">
                          {SAMPLE_LINKS.map((s, i) => (
                            <button 
                              key={i} 
                              type="button" 
                              onClick={() => {
                                setUrlInput(s.url);
                                showToast(`${s.label} link added! Click Analyse.`);
                              }} 
                              className="text-gray-400 hover:text-white text-xs font-semibold px-3.5 py-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/5 transition-all"
                            >
                              {s.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      {isProcessing && (
                        <div className="max-w-md mx-auto p-6 bg-[#0F1224]/80 rounded-2xl border border-blue-500/20 text-center space-y-4 shadow-lg animate-pulse">
                          <div className="inline-block animate-spin text-blue-400 text-xl">🔄</div>
                          <p className="text-sm text-blue-400 font-semibold">{processStep}</p>
                        </div>
                      )}

                      {mediaDetails && !isProcessing && (
                        <div className="max-w-xl mx-auto p-6 bg-[#0F1224]/80 rounded-2xl border border-white/[0.06] space-y-4 shadow-2xl">
                          <h3 className="font-bold text-lg text-white border-b border-white/[0.06] pb-3">{mediaDetails.title}</h3>
                          <div className="space-y-2.5">
                            {mediaDetails.formats.map(f => (
                              <div 
                                key={f.id} 
                                className="w-full p-4 rounded-xl border border-blue-500 bg-blue-500/10 text-blue-400 font-semibold flex justify-between items-center"
                              >
                                <span className="text-sm">{f.label}</span>
                                <span className="font-bold text-xs bg-white/5 px-2 py-1 rounded-lg">{f.size}</span>
                              </div>
                            ))}
                          </div>
                          {!isDownloading && !isCompleted && (
                            <button onClick={startDownload} type="button" className="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold text-sm transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                              Download Asli Video
                            </button>
                          )}
                          {isCompleted && (
                            <div className="text-center text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-xl font-semibold text-sm py-4">
                              ✓ Download Initiated! Check your files.
                            </div>
                          )}
                        </div>
                      )}
                    </div>

                    {/* Live Server Status Section */}
                    <div className="max-w-4xl mx-auto space-y-6 pt-8">
                      <div className="flex items-center justify-between border-b border-white/[0.04] pb-4">
                        <h3 className="text-lg font-bold text-white flex items-center gap-2">
                          <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span> Live Extraction Nodes
                        </h3>
                        <span className="text-xs text-gray-500 font-semibold">Updated Just Now</span>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="p-4 bg-white/[0.02] border border-white/[0.04] rounded-xl flex items-center justify-between">
                          <span className="text-sm font-semibold text-gray-300">YouTube Core API</span>
                          <span className="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-lg">99.9% Online</span>
                        </div>
                        <div className="p-4 bg-white/[0.02] border border-white/[0.04] rounded-xl flex items-center justify-between">
                          <span className="text-sm font-semibold text-gray-300">Instagram CDN Edge</span>
                          <span className="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-lg">100% Online</span>
                        </div>
                        <div className="p-4 bg-white/[0.02] border border-white/[0.04] rounded-xl flex items-center justify-between">
                          <span className="text-sm font-semibold text-gray-300">Spotify Metadata Node</span>
                          <span className="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-lg">99.4% Online</span>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activePage === 'features' && (
                  <div className="max-w-4xl mx-auto space-y-16 py-6">
                    <div className="text-center space-y-4">
                      <h2 className="text-3xl md:text-5xl font-extrabold tracking-tight text-white">
                        Why Choose <span className="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Glicks</span>?
                      </h2>
                      <p className="text-gray-400 max-w-md mx-auto text-sm leading-relaxed font-medium">
                        Bina kisi jhanjhat ke aapke favourite videos aur audio ko extract karne ke premium aur super-fast features.
                      </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="p-6 bg-[#0F1224]/80 border border-white/[0.06] rounded-2xl space-y-4 shadow-xl backdrop-blur-sm hover:border-blue-500/30 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-blue-600/10 flex items-center justify-center text-xl text-blue-400 border border-blue-500/20">🚀</div>
                        <h3 className="font-bold text-lg text-white">Super Fast Extraction</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                          Multi-threaded servers use karke aapki media files ko palak jhapakte hi convert aur fetch kiya jata hai.
                        </p>
                      </div>

                      <div className="p-6 bg-[#0F1224]/80 border border-white/[0.06] rounded-2xl space-y-4 shadow-xl backdrop-blur-sm hover:border-indigo-500/30 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-indigo-600/10 flex items-center justify-center text-xl text-indigo-400 border border-indigo-500/20">🛡️</div>
                        <h3 className="font-bold text-lg text-white">Zero Pop-up Ads</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                          Bina kisi virus aur irritating pop-ups ke. Ekdum clean experience taaki aap asani se files download kar sakein.
                        </p>
                      </div>

                      <div className="p-6 bg-[#0F1224]/80 border border-white/[0.06] rounded-2xl space-y-4 shadow-xl backdrop-blur-sm hover:border-purple-500/30 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-purple-600/10 flex items-center justify-center text-xl text-purple-400 border border-purple-500/20">💎</div>
                        <h3 className="font-bold text-lg text-white">HD Quality Options</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                          Yahan aapko 1080p video extraction se lekar 320kbps premium crystal-clear MP3 audio downloads ke options milte hain.
                        </p>
                      </div>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center pt-4">
                        {[
                          { label: "Happy Users", val: "50K+" },
                          { label: "Daily Downloads", val: "10K+" },
                          { label: "Processing Speed", val: "1 Gbps" },
                          { label: "Global Node Uptime", val: "99.9%" }
                        ].map((stat, i) => (
                            <div key={i} className="p-5 bg-white/[0.02] rounded-xl border border-white/[0.04]">
                                <div className="text-3xl font-extrabold text-blue-400">{stat.val}</div>
                                <div className="text-xs text-gray-500 font-semibold mt-1 uppercase tracking-wider">{stat.label}</div>
                            </div>
                        ))}
                    </div>

                    {/* FAQ */}
                    <div className="max-w-2xl mx-auto space-y-6 pt-6">
                      <h3 className="text-2xl font-bold text-white text-center">Frequently Asked Questions</h3>
                      <div className="space-y-4">
                        {[
                          { q: "Is Glicks completely free to use?", a: "Yes! Glicks is 100% free with unlimited conversion bandwidth and no premium subscription gatekeeping." },
                          { q: "Where do my files go after clicking downloa
