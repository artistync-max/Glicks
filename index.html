<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glicks - Premium Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #060814; color: #F3F4F6; }
    </style>
</head>
<body class="font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
          const [activePage, setActivePage] = React.useState('home');
          const [urlInput, setUrlInput] = React.useState('');
          const [isDownloading, setIsDownloading] = React.useState(false);
          
          // Download simulation logic
          const triggerDownload = () => {
            setIsDownloading(true);
            setTimeout(() => {
                // Real Browser Download Simulation
                const data = "Sample Media Data";
                const blob = new Blob([data], { type: 'video/mp4' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Glicks_Download.mp4';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setIsDownloading(false);
                alert("File download started! Check your browser's Downloads folder.");
            }, 2000);
          };

          return (
            <div className="min-h-screen bg-[#060814]">
              {/* Header */}
              <header className="border-b border-white/[0.04] bg-[#060814]/80 backdrop-blur-md sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                  <div className="text-xl font-extrabold text-white">Glicks</div>
                  <nav className="flex gap-6 text-sm font-medium">
                    <button onClick={() => setActivePage('home')} className={activePage === 'home' ? 'text-blue-400' : 'text-gray-400'}>Home</button>
                    <button onClick={() => setActivePage('features')} className={activePage === 'features' ? 'text-blue-400' : 'text-gray-400'}>Features</button>
                  </nav>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 py-12">
                {activePage === 'home' ? (
                  <div className="space-y-12">
                    <div className="text-center space-y-4">
                      <h1 className="text-4xl md:text-5xl font-extrabold text-white">Premium Media Extractor</h1>
                      <div className="max-w-md mx-auto bg-[#0F1224] p-4 rounded-2xl border border-white/10">
                        <input value={urlInput} onChange={(e) => setUrlInput(e.target.value)} placeholder="Paste link here..." className="w-full bg-transparent text-white outline-none mb-3" />
                        <button onClick={triggerDownload} className="w-full bg-blue-600 py-3 rounded-xl font-bold">
                          {isDownloading ? 'Processing...' : 'Start Download'}
                        </button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="max-w-5xl mx-auto space-y-12">
                    <h2 className="text-4xl font-extrabold text-white text-center">Why Premium?</h2>
                    
                    {/* Stats Grid */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                        {[{label: "Happy Users", val: "50K+"}, {label: "Daily Downloads", val: "10K+"}, {label: "Speed", val: "1Gbps"}, {label: "Uptime", val: "99.9%"}]
                        .map((stat, i) => (
                            <div key={i} className="p-4 bg-white/5 rounded-xl border border-white/10">
                                <div className="text-2xl font-bold text-blue-400">{stat.val}</div>
                                <div className="text-xs text-gray-500">{stat.label}</div>
                            </div>
                        ))}
                    </div>

                    {/* Features Detailed List */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {[
                            { title: "Universal Compatibility", desc: "Supports YouTube, Insta, TikTok, Twitter and 50+ platforms." },
                            { title: "Privacy First", desc: "No logs, no cookies, and no tracking. Your downloads remain private." },
                            { title: "No Subscription", desc: "Unlike others, we don't put limits or subscription walls. It's truly free." },
                            { title: "Fast CDN Nodes", desc: "Downloads distributed across 12 global nodes for maximum speed." }
                        ].map((f, i) => (
                            <div key={i} className="p-8 bg-[#0F1224] border border-white/5 rounded-3xl hover:border-blue-500/30 transition-all">
                                <h3 className="text-xl font-bold text-white mb-2">{f.title}</h3>
                                <p className="text-gray-400 text-sm">{f.desc}</p>
                            </div>
                        ))}
                    </div>
                  </div>
                )}
              </main>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
