<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glicks - Premium Media Downloader</title>
    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #050505; font-family: 'Inter', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #60A5FA, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
          const [url, setUrl] = React.useState('');
          const [loading, setLoading] = React.useState(false);
          const [result, setResult] = React.useState(null);

          const handleAnalyse = () => {
            if(!url) return;
            setLoading(true);
            setTimeout(() => {
              setLoading(false);
              setResult({ title: "Extracted Video File", format: "1080p MP4" });
            }, 2000);
          };

          return (
            <div className="min-h-screen p-4 flex flex-col items-center justify-center">
              {/* Premium Card */}
              <div className="glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
                <div className="flex justify-center mb-6">
                  <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/20">✨</div>
                </div>
                
                <h1 className="text-3xl font-extrabold text-center mb-2">Glicks</h1>
                <p className="text-gray-400 text-center text-sm mb-8">Premium Media Downloader</p>

                <div className="space-y-4">
                  <input 
                    type="url" 
                    placeholder="Paste link (YT, Insta, Spotify)..." 
                    className="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition-all"
                    value={url}
                    onChange={(e) => setUrl(e.target.value)}
                  />
                  <button 
                    onClick={handleAnalyse}
                    className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-xl font-bold shadow-xl hover:scale-[1.02] transition-transform"
                  >
                    {loading ? "Analysing..." : "Analyse Link"}
                  </button>
                </div>

                {result && (
                  <div className="mt-6 p-4 bg-green-500/10 border border-green-500/20 rounded-xl animate-in fade-in slide-in-from-bottom-4">
                    <p className="text-green-400 font-bold text-sm">✓ Found: {result.title}</p>
                    <p className="text-gray-300 text-xs mt-1">Quality: {result.format}</p>
                  </div>
                )}
              </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
